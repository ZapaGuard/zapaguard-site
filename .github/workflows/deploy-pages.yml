name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

jobs:
  tag:
    name: Tag release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Create release tag
        id: tag
        run: |
          existing=$(git tag --points-at HEAD | grep -E '^v[0-9]+$' | head -n 1 || true)
          if [ -n "$existing" ]; then
            tag="$existing"
          else
            last=$(git tag -l 'v*' | grep -E '^v[0-9]+$' | sed 's/^v//' | sort -n | tail -n 1 || true)
            tag="v$(( ${last:-0} + 1 ))"
            git tag "$tag"
            git push origin "refs/tags/$tag"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    needs: tag
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_APP_VERSION: ${{ needs.tag.outputs.tag }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=zapaguard --branch=main
